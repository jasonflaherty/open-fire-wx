name: Refresh fire data

on:
  schedule:
    # Refresh static data dumps every hour so Pages stays fresh
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/refresh-fire-data.mjs
      - run: node scripts/refresh-hotspots.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh fire and hotspot data'
          file_pattern: apps/web/public/data/fires.json apps/web/public/data/hotspots.json
