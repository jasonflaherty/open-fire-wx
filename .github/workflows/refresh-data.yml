name: Refresh fire data

on:
  schedule:
    # Daily static dumps — live NIFC/VIIRS stay fresh in the browser
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/refresh-fire-data.mjs
      - run: node scripts/refresh-hotspots.mjs
      - run: node scripts/refresh-odot-closures.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh fire, hotspot, and ODOT closure data'
          file_pattern: apps/web/public/data/fires.json apps/web/public/data/hotspots.json apps/web/public/data/odot-closures.json
